<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">    
    <title>Expelling Game</title>    
</head>
<body>
    <header class="header">
        <h1 class="header__title">
            Игра «Изгнание злых духов»
        </h1>
    </header>
    <main class="content">
        <div class="card">
            <div id="status" class="status">
                Изгнано злых духов: <span id="dead">0</span><br>
                Не изгнано: <span id="lost">0</span><br>
            </div>
            <div class="expelling-game">
                <div class="space" id="space1"></div>
                <div class="space" id="space2"></div>
                <div class="space" id="space3"></div>
                <div class="space" id="space4"></div>
                <div class="space" id="space5"></div>
                <div class="space" id="space6"></div>
                <div class="space" id="space7"></div>
                <div class="space" id="space8"></div>
                <div class="space" id="space9"></div>
                <div class="space" id="space10"></div>
                <div class="space" id="space11"></div>
                <div class="space" id="space12"></div>
                <div class="space" id="space13"></div>
                <div class="space" id="space14"></div>
                <div class="space" id="space15"></div>
                <div class="space" id="space16"></div>
            </div>
        </div>
    </main>    
</body>
</html>
